<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Mother's Day</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    overflow:hidden;
    height:100vh;
    width:100vw;
    position:relative;
    background:black;
}

/* FULL SCREEN PHOTO */

#bgPhoto{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-3;
    opacity:0;
    animation:fadeIn 2s forwards;
}

/* DARK OVERLAY */

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:-2;
}

/* CONTENT */

.content{
    position:relative;
    z-index:5;
    height:100vh;
    width:100vw;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    padding:20px;
}

/* HEADING */

.title{
    font-size:clamp(35px,6vw,70px);
    font-weight:700;
    text-shadow:0 5px 20px rgba(0,0,0,0.5);
    animation:zoomIn 2s ease;
}

/* NAME */

.name{
    margin-top:20px;
    font-size:clamp(28px,5vw,50px);
    font-weight:600;
    animation:slideUp 2s ease;
    text-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* MESSAGE */

.message{
    margin-top:25px;
    max-width:900px;
    font-size:clamp(18px,2.2vw,28px);
    line-height:1.8;
    font-weight:300;
    animation:fadeIn 3s ease;
    text-shadow:0 3px 10px rgba(0,0,0,0.5);
}

/* HEARTS */

.heart{
    position:absolute;
    bottom:-50px;
    color:#ff4d88;
    animation:floatUp linear infinite;
    opacity:0.8;
}

@keyframes floatUp{
    0%{
        transform:translateY(0) scale(1);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh) scale(1.8);
        opacity:0;
    }
}

/* ANIMATIONS */

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes zoomIn{
    from{
        transform:scale(0.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes slideUp{
    from{
        transform:translateY(100px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* LOADER */

.loader{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    color:white;
    font-size:30px;
    font-weight:600;
}

</style>
</head>

<body>

<div class="loader" id="loader">
Loading...
</div>

<img id="bgPhoto" src="" alt="Student Photo">

<div class="overlay"></div>

<div class="content">

    <div class="title">
        ❤️ Happy Mother's Day ❤️
    </div>

    <div class="name" id="studentName">
        Loading...
    </div>

    <div class="message">
        Thank you Mom for your endless love, care and sacrifices.<br>
        Your love makes every moment beautiful 💖
    </div>

</div>

<script>

/* GOOGLE APPS SCRIPT URL */

const SHEET_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

/* GET ID FROM URL */

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

/* PHOTO ELEMENT */

const photo = document.getElementById("bgPhoto");

/* LOAD PHOTO */

/* FOR JPG */
photo.src = "photos/" + id + ".JPG";

/* IF JPG NOT FOUND THEN TRY jpg */
photo.onerror = function(){
    photo.src = "photos/" + id + ".jpg";
};

/* FETCH NAME */

fetch(SHEET_URL + "?id=" + id)

.then(res => res.json())

.then(data => {

    document.getElementById("studentName").innerText = data.name;

    setTimeout(()=>{
        document.getElementById("loader").style.display = "none";
    },1000);

})

.catch(err => {

    document.getElementById("studentName").innerText =
    "Student Not Found";

});

/* HEART ANIMATION */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    heart.style.fontSize =
    (20 + Math.random() * 30) + "px";

    heart.style.animationDuration =
    (5 + Math.random() * 5) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
