<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Mother's Day</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      animation: bgPulse 3s ease-in-out infinite;
    }
    @keyframes bgPulse {
      0%, 100% { background: linear-gradient(135deg, #ffdde1, #ee9ca7); }
      50% { background: linear-gradient(135deg, #ffe0e6, #ffb0bd); }
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      width: 90%;
      max-width: 550px;
      border-radius: 35px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      animation: floatCard 3s ease-in-out infinite;
      backdrop-filter: blur(5px);
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      color: #e91e63;
      margin-bottom: 15px;
      font-size: 2em;
      animation: titleGlow 2s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 5px #ffb6c1, 0 0 10px #ffb6c1; }
      50% { text-shadow: 0 0 20px #e91e63, 0 0 30px #ff69b4; }
    }
    .photo {
      width: 320px;
      height: 320px;
      border-radius: 25px;
      object-fit: cover;
      border: 8px solid #ffb6c1;
      margin-top: 15px;
      transition: all 0.5s ease;
      animation: photoGlow 2s ease-in-out infinite;
      background: #f0f0f0;
    }
    @keyframes photoGlow {
      0%, 100% { box-shadow: 0 0 5px #ffb6c1; }
      50% { box-shadow: 0 0 20px #e91e63; }
    }
    .name {
      font-size: 32px;
      font-weight: bold;
      margin-top: 20px;
      background: linear-gradient(135deg, #e91e63, #ff6b9d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: nameWave 1.5s ease-in-out infinite;
    }
    @keyframes nameWave {
      0%, 100% { letter-spacing: normal; }
      50% { letter-spacing: 3px; }
    }
    .message, .footer {
      margin-top: 15px;
      color: #555;
      animation: fadeInOut 3s ease-in-out infinite;
    }
    .footer { margin-top: 20px; color: #999; font-size: 14px; }
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .spinner-section { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ffb6c1; }
    .spinner-btn {
      background: linear-gradient(135deg, #e91e63, #ff6b9d);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(233,30,99,0.4);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .spinner-btn:hover { transform: scale(1.05); }
    .wheel {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #e91e63 0deg 45deg, #ff6b9d 45deg 90deg, #ffb6c1 90deg 135deg, #ff1493 135deg 180deg, #e91e63 180deg 225deg, #ff6b9d 225deg 270deg, #ffb6c1 270deg 315deg, #ff1493 315deg 360deg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
      cursor: pointer;
      margin: 0 auto;
      position: relative;
    }
    .wheel::before { content: "🎡"; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 30px; }
    .wheel::after { content: "▼"; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); font-size: 25px; color: #e91e63; }
    .spinner-result, .remaining { margin-top: 15px; font-size: 16px; color: #e91e63; font-weight: bold; }
    .remaining { font-size: 12px; color: #999; }
    .heart {
      position: fixed;
      font-size: 20px;
      pointer-events: none;
      animation: floatUp 4s ease-in forwards;
      z-index: 1000;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }
    .debug-info { background: #f0f0f0; padding: 8px; margin-top: 15px; border-radius: 8px; font-size: 11px; color: #666; word-break: break-all; }
  </style>
</head>
<body>

<div class="card">
  <h1>❤️ Happy Mother's Day ❤️</h1>
  <img id="studentPhoto" class="photo" src="" alt="Student Photo">
  <div class="name" id="studentName">Loading...</div>
  <div class="message">Thank you Mom for your endless love, care and support.<br>You are the heart of our family 💖</div>
  <div class="footer">With Love</div>

  <div id="spinnerModeContainer" style="display: none;">
    <div class="spinner-section">
      <button class="spinner-btn" id="spinnerBtn">🎰 Spin the Wheel 🎰</button>
      <div class="spinner-container">
        <div class="wheel" id="wheel"></div>
        <div class="spinner-result" id="spinnerResult"></div>
        <div class="remaining" id="remainingCount"></div>
      </div>
    </div>
  </div>

  <!-- Debug panel (will show errors/messages) -->
  <div id="debugInfo" class="debug-info"></div>
</div>

<script>
// ======================= CONFIGURATION =======================
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwTAI9jNz5_f1zmHltGgYztCN2fkrQpvaXjuJslX2vOHquKoLi2zLfVF0v-NPvQZQ56/exec";

// Global variables
let allStudents = [];
let remainingStudents = [];
let isSpinning = false;

// Get URL parameters
const urlParams = new URLSearchParams(window.location.search);
const isSpinnerMode = urlParams.get("mode") === "spinner";
const id = urlParams.get("id");

// Debug function
function debugLog(msg) {
  console.log(msg);
  const debugDiv = document.getElementById('debugInfo');
  if (debugDiv) {
    debugDiv.innerHTML += `<div>🔍 ${new Date().toLocaleTimeString()}: ${msg}</div>`;
    debugDiv.scrollTop = debugDiv.scrollHeight;
  }
}

// ======================= HELPER FUNCTIONS =======================
function createFloatingHearts() {
  for(let i = 0; i < 5; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕'][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 4000);
    }, i * 200);
  }
}

function displayStudent(student) {
  if (!student) {
    debugLog("displayStudent called with null/undefined");
    return;
  }
  
  debugLog(`Displaying student: ID=${student.id}, Name=${student.name}`);
  document.getElementById("studentName").innerText = student.name;
  
  const img = document.getElementById("studentPhoto");
  // Try multiple paths and extensions
  const possiblePaths = [
    `photos/${student.id}.JPG`,
    `photos/${student.id}.jpg`,
    `photos/${student.id}.png`,
    `photos/${student.id}.jpeg`,
    `${student.id}.JPG`,
    `${student.id}.jpg`,
    `https://via.placeholder.com/320x320?text=${encodeURIComponent(student.name)}`
  ];
  
  let attempt = 0;
  
  function tryNextPath() {
    if (attempt >= possiblePaths.length) {
      debugLog("All photo paths failed, using placeholder");
      img.src = possiblePaths[possiblePaths.length - 1];
      return;
    }
    const path = possiblePaths[attempt];
    debugLog(`Trying photo path: ${path}`);
    img.src = path;
    attempt++;
  }
  
  img.onerror = function() {
    debugLog(`Failed to load: ${img.src}`);
    tryNextPath();
  };
  img.onload = function() {
    debugLog(`Successfully loaded: ${img.src}`);
  };
  tryNextPath();
  
  createFloatingHearts();
}

// ======================= DATA FETCHING =======================
function loadStudentData() {
  let url = SHEET_URL;
  if (id && !isSpinnerMode) {
    url = SHEET_URL + "?id=" + encodeURIComponent(id);
    debugLog(`Fetching single student: ${url}`);
  } else {
    debugLog(`Fetching all students: ${url}`);
  }
  
  fetch(url)
    .then(response => {
      debugLog(`HTTP status: ${response.status}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    })
    .then(data => {
      debugLog(`Received data type: ${Array.isArray(data) ? 'Array' : typeof data}`);
      debugLog(`Data sample: ${JSON.stringify(data).substring(0, 200)}`);
      
      // Case: single student object (response from ?id=xxx)
      if (data && data.name && !Array.isArray(data)) {
        debugLog(`Single student mode: ${data.name}`);
        allStudents = [data];
        displayStudent(data);
      }
      // Case: array of students (response from no id or spinner)
      else if (Array.isArray(data) && data.length > 0) {
        debugLog(`Array mode: ${data.length} students found`);
        allStudents = data;
        
        if (isSpinnerMode) {
          debugLog("Spinner mode active - showing wheel");
          remainingStudents = [...allStudents];
          document.getElementById('spinnerModeContainer').style.display = 'block';
          updateRemainingCount();
          const randomStudent = allStudents[Math.floor(Math.random() * allStudents.length)];
          displayStudent(randomStudent);
        } else if (id) {
          const student = allStudents.find(s => String(s.id) === String(id));
          if (student) {
            debugLog(`Found student with ID ${id}: ${student.name}`);
            displayStudent(student);
          } else {
            debugLog(`Student ID ${id} not found in data`);
            document.getElementById("studentName").innerText = "Student Not Found";
            document.getElementById("studentPhoto").src = "https://via.placeholder.com/320x320?text=❌+Not+Found";
          }
        } else {
          // random student
          const randomStudent = allStudents[Math.floor(Math.random() * allStudents.length)];
          debugLog(`No ID, showing random: ${randomStudent.name}`);
          displayStudent(randomStudent);
        }
      } else {
        debugLog("No valid data received");
        document.getElementById("studentName").innerText = "No Data Available";
        document.getElementById("studentPhoto").src = "https://via.placeholder.com/320x320?text=📭+No+Data";
      }
    })
    .catch(err => {
      debugLog(`FETCH ERROR: ${err.message}`);
      document.getElementById("studentName").innerText = "Connection Error";
      document.getElementById("studentPhoto").src = "https://via.placeholder.com/320x320?text=⚠️+Error";
    });
}

// ======================= SPINNER LOGIC =======================
function updateRemainingCount() {
  const remainingElem = document.getElementById('remainingCount');
  if (remainingStudents.length > 0) {
    remainingElem.innerHTML = `🎯 ${remainingStudents.length} student${remainingStudents.length !== 1 ? 's' : ''} remaining`;
  } else {
    remainingElem.innerHTML = '🎉 All done! Resetting... 🎉';
    remainingStudents = [...allStudents];
  }
}

function spinWheel() {
  if (isSpinning) return;
  if (remainingStudents.length === 0 && allStudents.length > 0) {
    remainingStudents = [...allStudents];
    document.getElementById("spinnerResult").innerHTML = "🎊 Starting over! 🎊";
    updateRemainingCount();
    setTimeout(() => {
      document.getElementById("spinnerResult").innerHTML = "";
    }, 1500);
    return;
  }
  
  if (remainingStudents.length === 0) {
    debugLog("No students to spin");
    return;
  }
  
  isSpinning = true;
  const wheel = document.getElementById('wheel');
  const spinnerResult = document.getElementById('spinnerResult');
  
  spinnerResult.innerHTML = "🎡 Spinning... 🎡";
  const spinDegrees = 1440 + Math.random() * 720;
  wheel.style.transition = "transform 1.5s cubic-bezier(0.33, 1, 0.68, 1)";
  wheel.style.transform = `rotate(${spinDegrees}deg)`;
  
  setTimeout(() => {
    const randomIndex = Math.floor(Math.random() * remainingStudents.length);
    const selectedStudent = remainingStudents[randomIndex];
    remainingStudents.splice(randomIndex, 1);
    
    spinnerResult.innerHTML = `✨ ${selectedStudent.name}! ✨`;
    displayStudent(selectedStudent);
    updateRemainingCount();
    createFloatingHearts();
    isSpinning = false;
    
    // Reset wheel
    setTimeout(() => {
      wheel.style.transition = "none";
      const currentRotate = spinDegrees % 360;
      wheel.style.transform = `rotate(${currentRotate}deg)`;
      setTimeout(() => {
        wheel.style.transition = "transform 0.5s cubic-bezier(0.33, 1, 0.68, 1)";
      }, 50);
    }, 100);
    
    setTimeout(() => {
      if (spinnerResult.innerHTML !== "🎡 Spinning... 🎡") {
        spinnerResult.innerHTML = "";
      }
    }, 2500);
  }, 1500);
}

// ======================= INIT =======================
if (isSpinnerMode) {
  setTimeout(() => {
    const spinnerBtn = document.getElementById('spinnerBtn');
    const wheelElement = document.getElementById('wheel');
    if (spinnerBtn) spinnerBtn.addEventListener('click', spinWheel);
    if (wheelElement) wheelElement.addEventListener('click', spinWheel);
    debugLog("Spinner event listeners attached");
  }, 100);
}

loadStudentData();

setInterval(() => {
  if (Math.random() > 0.7) createFloatingHearts();
}, 3000);
</script>

</body>
</html>
