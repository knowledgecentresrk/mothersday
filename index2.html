<script>

const SHEET_URL = "https://script.google.com/macros/s/AKfycbwTAI9jNz5_f1zmHltGgYztCN2fkrQpvaXjuJslX2vOHquKoLi2zLfVF0v-NPvQZQ56/exec";

let students = [];

let remaining = [];

const wheel = document.getElementById("wheel");

/* LOAD STUDENTS FROM GOOGLE SHEET */

fetch(SHEET_URL)

.then(res => res.json())

.then(data => {

    students = data;

    remaining = [...students];

})

.catch(err => {

    alert("Google Sheet not loading");

});

/* SPIN FUNCTION */

function spinWheel(){

    if(students.length === 0){

        alert("Data still loading");

        return;
    }

    if(remaining.length === 0){

        alert("All students completed!");

        remaining = [...students];
    }

    const randomIndex =
    Math.floor(Math.random() * remaining.length);

    const student =
    remaining[randomIndex];

    remaining.splice(randomIndex,1);

    const rotation =
    3600 + Math.floor(Math.random()*360);

    wheel.style.transform =
    `rotate(${rotation}deg)`;

    setTimeout(()=>{

        document.getElementById("result").style.display =
        "block";

        document.getElementById("photo").src =
        "photos/" + student.id + ".JPG";

        document.getElementById("studentName").innerText =
        student.name;

    },5000);
}

/* HEARTS */

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤️";

    heart.style.left =
    Math.random() * 100 + "vw";

    heart.style.fontSize =
    (20 + Math.random()*30) + "px";

    heart.style.animationDuration =
    (5 + Math.random()*5) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },10000);
}

setInterval(createHeart,300);

</script>
